# golangci-lint v2 configuration.
# The v1 binary (v1.48.0) panicked on modern Go; this is a clean v2 config.
# High-signal linters (errcheck/govet/ineffassign/misspell/unused/staticcheck)
# + gofmt/goimports. staticcheck's opinionated style (ST1*) / quick-fix (QF1*) /
# simplification (S1*) families are suppressed — the codebase has its own
# consistent style; `go vet` + the SA* correctness checks carry the value.
# golangci-lint v2+ required.
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
    # K2 high-signal, low-noise additions (bug-catching, not opinionated style):
    - errorlint    # %w wrapping + errors.Is vs == (catches lost error chains)
    - nilerr       # returning nil after err != nil
    - nilnesserr   # nil-pointer dereference on err paths
    - wastedassign # assignments whose value is never used
    - reassign     # reassigning package vars (math/rand, etc.)
  exclusions:
    rules:
      # errcheck noise: unchecked .Close() etc. in tests is idiomatic and
      # low-signal; production code is still fully checked.
      # errorlint: test assertions often compare a sentinel directly (e.g.
      # err != io.EOF for a stream EOF), which is correct for unwrapped errors
      # and lower-signal than production error-chain handling.
      - path: "_test\\.go"
        linters:
          - errcheck
          - errorlint
          - wastedassign
      # Opinionated style / quick-fix / simplification families — disabled wholesale.
      - linters:
          - staticcheck
        text: "ST1[0-9]{3}:" # naming, comment form, package comment, etc.
      - linters:
          - staticcheck
        text: "QF1[0-9]{3}:" # optional mechanical simplifications
      - linters:
          - staticcheck
        text: "S1[0-9]{3}:"  # gosimple suggestions
      # Intentional patterns.
      - linters:
          - staticcheck
        text: "SA1019"       # deprecated API use (several legacy fields are intentional)
      - linters:
          - staticcheck
        text: "SA1012"       # nil context passed in tests to exercise error paths
      - linters:
          - staticcheck
        text: "SA1029"       # built-in string key for context — the extractor keys ON string keys
      - linters:
          - staticcheck
        text: "SA4000"       # identical expressions in test assertions (coverage of both arms)
      - linters:
          - staticcheck
        text: "SA4006"       # unused value in tests
      - linters:
          - staticcheck
        text: "SA9003"       # empty branch (intentional placeholder)
      - linters:
          - unused
        text: "`data` is unused"
    paths:
      - "builtin$"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/v8fg/kit4go
