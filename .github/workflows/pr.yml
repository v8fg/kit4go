name: CI

# Triggers: pushes to `release`, version tags (v*), and PRs targeting `release`.
# `release` is the primary branch (origin/HEAD -> release); `main` mirrors it.
on:
  push:
    tags:
      - v*
    branches:
      - release
  pull_request:
    branches:
      - release

permissions:
  contents: read

jobs:
  test:
    # Cross-platform (linux + macos) because kit4go is a pure-Go library used on
    # both. Go version is read from go.mod via go-version-file, so this never
    # goes stale when the module bumps its Go directive.
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt (fail if any file is unformatted)
        run: |
          set -euo pipefail
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$diff"
            gofmt -d .
            exit 1
          fi

      # -short skips the postgres live-PG integration test (it also self-skips
      #   when PG_HOST is unset); -race enforces concurrency safety across all
      #   packages (breaker/limiter/clients/latency/log4go hot paths).
      - name: Test
        run: go test -short -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  # golangci-lint is intentionally NOT run here: the previous job used v1.48.0,
  # which panics ("can't load fmt") against modern Go. Re-enabling requires
  # migrating .golangci.yml to the golangci-lint v2 schema — do that as a
  # follow-up, then add a golangci/golangci-lint-action@v6 job. Until then,
  # `go vet` above carries the essential static analysis.
