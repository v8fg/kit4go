name: CI

# Triggers: pushes to `release`, version tags (v*), and PRs targeting `release`.
# `release` is the primary branch (origin/HEAD -> release); `main` mirrors it.
on:
  push:
    tags:
      - v*
    branches:
      - release
  pull_request:
    branches:
      - release

permissions:
  contents: read

jobs:
  test:
    # Cross-platform (linux + macos) because kit4go is a pure-Go library used on
    # both. Go version is read from go.mod via go-version-file, so this never
    # goes stale when the module bumps its Go directive.
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # kit4go is a multi-module repo: the root module plus three sub-modules
      # (log4go, postgres, grpcclient), each with its own go.mod. `go build/test
      # ./...` does NOT descend across module boundaries, so every gate runs
      # once per module.
      - name: Build (all modules)
        run: |
          set -e
          go build ./...
          for m in log4go postgres grpcclient; do (cd "$m" && go build ./...); done

      - name: Vet (all modules)
        run: |
          set -e
          go vet ./...
          for m in log4go postgres grpcclient; do (cd "$m" && go vet ./...); done

      - name: gofmt (fail if any file is unformatted)
        run: |
          set -euo pipefail
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$diff"
            gofmt -d .
            exit 1
          fi

      # -short skips the postgres live-PG integration test (it also self-skips
      #   when PG_HOST is unset); -race enforces concurrency safety across all
      #   packages (breaker/limiter/clients/latency/log4go hot paths).
      - name: Test (all modules)
        run: |
          set -e
          go test -short -race -count=1 -coverprofile=coverage-root.out -covermode=atomic ./...
          for m in log4go postgres grpcclient; do
            (cd "$m" && go test -short -race -count=1 -coverprofile="coverage-$m.out" -covermode=atomic ./...)
            mv "$m/coverage-$m.out" .
          done

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage-root.out,./coverage-log4go.out,./coverage-postgres.out,./coverage-grpcclient.out
          fail_ci_if_error: false

  # golangci-lint is intentionally NOT run here: the historical config used
  # v1.48.0, which panics ("can't load fmt") against modern Go. Re-enabling
  # requires migrating .golangci.yml to the golangci-lint v2 schema — do that as
  # a follow-up, then add a golangci/golangci-lint-action@v6 job. Until then,
  # `go vet` above carries the essential static analysis.
