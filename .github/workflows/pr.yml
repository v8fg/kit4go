name: CI

# Triggers: pushes to `release`, version tags (v*), and PRs targeting `release`.
# `release` is the primary branch (origin/HEAD -> release); `main` mirrors it.
on:
  push:
    tags:
      - v*
    branches:
      - release
  pull_request:
    branches:
      - release

permissions:
  contents: read

jobs:
  test:
    # Cross-platform (linux + macos) because kit4go is a pure-Go library used on
    # both. Go version is read from go.mod via go-version-file, so this never
    # goes stale when the module bumps its Go directive.
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # kit4go is a multi-module repo: the root module plus three sub-modules
      # (log4go, postgres, grpcclient), each with its own go.mod. `go build/test
      # ./...` does NOT descend across module boundaries, so every gate runs
      # once per module.
      - name: Build (all modules)
        run: |
          set -e
          go build ./...
          for m in adaptive clickhouse email grpcclient grpcserver kafka log4go metrics postgres rate redis redislock tracing; do (cd "$m" && go build ./...); done

      - name: Vet (all modules)
        run: |
          set -e
          go vet ./...
          for m in adaptive clickhouse email grpcclient grpcserver kafka log4go metrics postgres rate redis redislock tracing; do (cd "$m" && go vet ./...); done

      - name: gofmt (fail if any file is unformatted)
        run: |
          set -euo pipefail
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$diff"
            gofmt -d .
            exit 1
          fi

      # -short skips the postgres live-PG integration test (it also self-skips
      #   when PG_HOST is unset); -race enforces concurrency safety across all
      #   packages (breaker/limiter/clients/latency/log4go hot paths).
      - name: Test (all modules)
        run: |
          set -e
          go test -short -race -count=1 -coverprofile=coverage-root.out -covermode=atomic ./...
          for m in adaptive clickhouse email grpcclient grpcserver kafka log4go metrics postgres rate redis redislock tracing; do
            (cd "$m" && go test -short -race -count=1 -coverprofile="coverage-$m.out" -covermode=atomic ./...)
            mv "$m/coverage-$m.out" .
          done

      # The kafka module has a build-tag-selected franz-go backend
      # (-tags franzgo); verify it also builds/vets/tests. The sarama backend
      # was covered by the loop above (default build).
      - name: Test kafka franz-go backend (-tags franzgo)
        run: |
          set -e
          cd kafka
          go build -tags franzgo ./...
          go vet -tags franzgo ./...
          go test -short -race -count=1 ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage-root.out,./coverage-clickhouse.out,./coverage-log4go.out,./coverage-postgres.out,./coverage-grpcclient.out,./coverage-kafka.out
          fail_ci_if_error: false

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Install via the official script (golangci-lint v2 needs
      # golangci-lint-action v7; the direct install avoids action-version churn).
      # The repo is multi-module, so golangci-lint runs once per module (./...
      # does not cross go.mod boundaries); the v2 config at the repo root is
      # auto-discovered from each sub-module dir.
      - name: Install golangci-lint v2
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.4
          golangci-lint version

      - name: golangci-lint (all modules)
        run: |
          set -e
          golangci-lint run --timeout=5m ./...
          for m in adaptive clickhouse email grpcclient grpcserver kafka log4go metrics postgres rate redis redislock tracing; do
            (cd "$m" && golangci-lint run --timeout=5m ./...)
          done
          # kafka franz-go backend (build-tag-selected alternate impl)
          (cd kafka && golangci-lint run --build-tags franzgo --timeout=5m ./...)

